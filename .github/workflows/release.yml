name: Release

# Push a `v<version>` tag (e.g. v0.1.0) to cut a release. The tag name sets the
# published plugin version, so it need not match gradle.properties.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      # The Gradle build cross-compiles the bundled ergo binaries.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Gate the release on green tests and a clean plugin verification —
      # tag pushes do not trigger ci.yml.
      - name: Test
        run: ./gradlew test

      - name: Verify plugin
        run: ./gradlew verifyPlugin -Pversion="${GITHUB_REF_NAME#v}"

      - name: Sign and publish to JetBrains Marketplace
        run: ./gradlew publishPlugin -Pversion="${GITHUB_REF_NAME#v}"
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          # The signing key is unencrypted, so no PRIVATE_KEY_PASSWORD is
          # needed. If you switch to an encrypted key, add that secret and
          # pass it here as well.

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          build/distributions/*-signed.zip
          --title "$GITHUB_REF_NAME"
          --generate-notes
